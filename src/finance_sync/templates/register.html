<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>finance-sync — Create Account</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --surface: #1a1d28;
            --surface-2: #242736;
            --border: #2e3245;
            --text: #e1e4ef;
            --text-muted: #8b8fa3;
            --accent: #6c63ff;
            --accent-hover: #7b73ff;
            --green: #34d399;
            --red: #f87171;
            --radius: 10px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        html { font-size: 15px; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            width: 400px;
            max-width: 95vw;
        }
        .auth-box h1 {
            font-size: 1.3rem;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }
        .auth-box h1 span { color: var(--accent); }
        .auth-box .sub {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }
        .form-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s;
        }
        .form-group input:focus { border-color: var(--accent); }
        .form-group input::placeholder { color: var(--text-muted); opacity: 0.6; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            color: var(--red);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .success {
            color: var(--green);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }
        .toast-error { background: #7f1d1d; color: #fee2e2; border: 1px solid #dc2626; }
        .toast-success { background: #065f46; color: #d1fae5; border: 1px solid #059669; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .footer-link a {
            color: var(--accent);
            text-decoration: none;
        }
        .footer-link a:hover { color: var(--accent-hover); }
        .password-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>
    <div class="auth-box">
        <h1>finance<span>-sync</span></h1>
        <div class="sub">Create your account</div>
        <div class="error hidden" id="register-error"></div>
        <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="display_name">Display Name (optional)</label>
                <input type="text" id="display_name" placeholder="Your name" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
                <div class="password-hint">Minimum 8 characters</div>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Repeat your password" required minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="btn" id="register-btn">Create Account</button>
        </form>
        <div class="footer-link">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
    <script>
        const API_BASE = '/api/v1';

        function toast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 4000);
        }

        async function handleRegister(event) {
            event.preventDefault();
            const btn = document.getElementById('register-btn');
            const errorEl = document.getElementById('register-error');
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            // Client-side password confirmation check
            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match';
                errorEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Creating account...';
            errorEl.classList.add('hidden');

            try {
                const resp = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        display_name: document.getElementById('display_name').value || null,
                    }),
                });
                const data = await resp.json();
                if (!resp.ok) {
                    throw new Error(data.detail || 'Registration failed');
                }
                localStorage.setItem('fs_token', data.access_token);
                localStorage.setItem('fs_refresh_token', data.refresh_token);
                toast('Account created! Redirecting...', 'success');
                setTimeout(() => { window.location.href = '/'; }, 800);
            } catch (e) {
                errorEl.textContent = e.message;
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        // If already authenticated, redirect to dashboard
        (function() {
            const token = localStorage.getItem('fs_token');
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.exp * 1000 > Date.now()) {
                        window.location.href = '/';
                    }
                } catch {}
            }
        })();
    </script>
</body>
</html>
