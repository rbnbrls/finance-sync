<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>finance-sync — Sign In</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --surface: #1a1d28;
            --surface-2: #242736;
            --border: #2e3245;
            --text: #e1e4ef;
            --text-muted: #8b8fa3;
            --accent: #6c63ff;
            --accent-hover: #7b73ff;
            --red: #f87171;
            --radius: 10px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        html { font-size: 15px; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            width: 380px;
            max-width: 95vw;
        }
        .login-box h1 {
            font-size: 1.3rem;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }
        .login-box h1 span { color: var(--accent); }
        .login-box .sub {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-muted);
        }
        .form-group input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.15s;
        }
        .form-group input:focus { border-color: var(--accent); }
        .form-group input::placeholder { color: var(--text-muted); opacity: 0.6; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #fff;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary {
            background: transparent;
            color: var(--text);
            border-color: var(--border);
        }
        .btn-secondary:hover { background: var(--surface-2); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .error {
            color: var(--red);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }
        .toast-success { background: #065f46; color: #d1fae5; border: 1px solid #059669; }
        .toast-error { background: #7f1d1d; color: #fee2e2; border: 1px solid #dc2626; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ── Feedback Button ──────────────────────────────────────────── */
        .feedback-trigger {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 1px solid transparent;
            border-right: none;
            border-radius: 8px 0 0 8px;
            padding: 10px 6px;
            cursor: pointer;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            transition: all 0.25s ease;
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 500;
            writing-mode: vertical-lr;
            letter-spacing: 0.04em;
            font-family: var(--font);
            opacity: 0.5;
        }
        .feedback-trigger:hover {
            opacity: 1;
            background: color-mix(in srgb, var(--surface) 70%, transparent);
            color: var(--accent);
            border-color: color-mix(in srgb, var(--accent) 35%, transparent);
            padding: 12px 8px;
        }
        .feedback-trigger .icon {
            writing-mode: horizontal-tb;
            font-size: 1rem;
            margin-bottom: 1px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .feedback-trigger:hover .icon {
            opacity: 1;
        }

        /* ── Shared Utilities ──────────────────────────────────────────── */
        .hidden { display: none !important; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.2s;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
        .alert-error {
            background: rgba(248, 113, 113, 0.1);
            color: var(--red);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ── Feedback Modal ──────────────────────────────────────────── */
        .feedback-modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            width: 520px;
            max-width: 95vw;
            max-height: 90vh;
            overflow-y: auto;
        }
        .feedback-modal h2 {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .feedback-modal .sub {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .feedback-modal textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font);
            outline: none;
            resize: vertical;
            min-height: 140px;
            transition: border-color 0.15s;
        }
        .feedback-modal textarea:focus { border-color: var(--accent); }
        .feedback-modal textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
        .feedback-modal .type-select {
            display: flex;
            gap: 8px;
        }
        .feedback-modal .type-option {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
            transition: all 0.15s;
            font-family: var(--font);
        }
        .feedback-modal .type-option:hover {
            border-color: var(--accent);
            color: var(--text);
        }
        .feedback-modal .type-option.selected {
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.1);
            color: var(--accent);
        }
        .feedback-modal .type-option .type-icon {
            display: block;
            font-size: 1.2rem;
            margin-bottom: 2px;
        }
        .feedback-modal .char-count {
            text-align: right;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .feedback-modal .char-count.over { color: var(--red); }
        .feedback-modal .feedback-success {
            text-align: center;
            padding: 40px 20px;
        }
        .feedback-modal .feedback-success .check {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        .feedback-modal .feedback-success h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .feedback-modal .feedback-success p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toast-container"></div>
    <div class="login-box">
        <h1>finance<span>-sync</span></h1>
        <div class="sub">Sign in to the control panel</div>
        <div class="error hidden" id="login-error"></div>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="admin@finance-sync.local" value="admin@finance-sync.local" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn" id="login-btn">Sign In</button>
        </form>
        <div style="text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted);">
            Don't have an account? <a href="/register" style="color: var(--accent); text-decoration: none;">Create one</a>
        </div>
    </div>

    <!-- Feedback trigger button — emits custom event for integration layer -->
    <button class="feedback-trigger" id="feedback-trigger" title="Send feedback" aria-label="Send feedback">
        <span class="icon">&#9993;</span>
        Feedback
    </button>

    <!-- Modal Container — integration layer injects feedback modal here -->
    <div id="modal-container"></div>

    <script>
        const API_BASE = '/api/v1';

        // ── Feedback submission guard ────────────────────────────────────
        let __feedbackSubmitting = false;  // state machine: prevents double-submit

        function toast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 4000);
        }

        async function handleLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Signing in...';
            errorEl.classList.add('hidden');

            try {
                const resp = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                    }),
                });
                const data = await resp.json();
                if (!resp.ok) {
                    throw new Error(data.detail || 'Invalid credentials');
                }
                localStorage.setItem('fs_token', data.access_token);
                // Also store refresh token
                localStorage.setItem('fs_refresh_token', data.refresh_token);
                window.location.href = '/';
            } catch (e) {
                errorEl.textContent = e.message;
                errorEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        // If already authenticated, redirect to dashboard
        (function() {
            const token = localStorage.getItem('fs_token');
            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.exp * 1000 > Date.now()) {
                        window.location.href = '/';
                    }
                } catch {}
            }
        })();
    </script>

    <script>
        // ── Feedback button event wiring ────────────────────────────────
        document.addEventListener('DOMContentLoaded', function () {
            const btn = document.getElementById('feedback-trigger');
            if (btn) {
                btn.addEventListener('click', function () {
                    document.dispatchEvent(new CustomEvent('open-feedback-form'));
                });
            }
        });

        // ── Feedback Modal ──────────────────────────────────────────────
        function openFeedbackModal(onSubmit) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.id = 'feedback-modal-overlay';
            // Store the optional callback for the integration layer.
            // onSubmit receives { type, description, contact } when provided.
            modal._onSubmit = typeof onSubmit === 'function' ? onSubmit : null;
            modal.innerHTML = `
                <div class="feedback-modal">
                    <div id="feedback-form-view">
                        <h2>Send Feedback</h2>
                        <div class="sub">Report a bug or suggest a feature for finance-sync.</div>

                        <div class="form-group">
                            <label>Type</label>
                            <div class="type-select">
                                <div class="type-option selected" data-type="bug" onclick="selectFeedbackType(this)">
                                    <span class="type-icon">&#128169;</span>
                                    Bug Report
                                </div>
                                <div class="type-option" data-type="feature" onclick="selectFeedbackType(this)">
                                    <span class="type-icon">&#128161;</span>
                                    Feature Request
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="feedback-title">Title <span style="color:var(--red)">*</span></label>
                            <input type="text" id="feedback-title" placeholder="Brief summary of your feedback" maxlength="200" required>
                        </div>

                        <div class="form-group">
                            <label for="feedback-desc">Description <span style="color:var(--red)">*</span></label>
                            <textarea id="feedback-desc" placeholder="Describe the bug or feature request in detail." maxlength="2000" oninput="updateFeedbackCharCount()"></textarea>
                            <div class="char-count" id="feedback-char-count">0 / 2000</div>
                        </div>

                        <div class="form-group">
                            <label for="feedback-email">Email <span style="color:var(--text-muted);font-size:0.8rem;">(optional — for follow-up)</span></label>
                            <input type="email" id="feedback-email" placeholder="your@email.com">
                        </div>

                        <div id="feedback-error" class="hidden alert alert-error"></div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                            <button type="button" class="btn btn-primary" id="feedback-submit" onclick="submitFeedback()">Submit Feedback</button>
                        </div>
                    </div>
                    <div id="feedback-success-view" class="hidden">
                        <div class="feedback-success">
                            <div class="check">&#10003;</div>
                            <h3>Thank You!</h3>
                            <p>Your feedback has been submitted. We'll review it as soon as possible.</p>
                            <p><a href="#" class="issue-link hidden" target="_blank" rel="noopener" style="color:var(--accent);font-weight:600;">View issue</a></p>
                            <button class="btn btn-primary" onclick="closeModal()">Close</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-container').appendChild(modal);
            modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
            document.getElementById('feedback-title').focus();
        }

        function selectFeedbackType(el) {
            document.querySelectorAll('.type-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        function updateFeedbackCharCount() {
            const desc = document.getElementById('feedback-desc');
            const count = document.getElementById('feedback-char-count');
            const len = desc.value.length;
            count.textContent = `${len} / 2000`;
            count.classList.toggle('over', len > 2000);
        }

        function closeModal() {
            __feedbackSubmitting = false;
            const modals = document.querySelectorAll('.modal-overlay');
            modals.forEach(m => m.remove());
        }

        async function submitFeedback() {
            // ── State machine: reject if already submitting ─────────────
            if (__feedbackSubmitting) return;
            __feedbackSubmitting = true;

            const title = document.getElementById('feedback-title').value.trim();
            const desc = document.getElementById('feedback-desc').value.trim();
            const typeEl = document.querySelector('.type-option.selected');
            const type = typeEl ? typeEl.dataset.type : 'feature';
            const email = document.getElementById('feedback-email').value.trim();
            const errorEl = document.getElementById('feedback-error');
            const submitBtn = document.getElementById('feedback-submit');

            // ── Validation ─────────────────────────────────────────────
            if (!title) {
                __feedbackSubmitting = false;
                errorEl.textContent = 'Please enter a title.';
                errorEl.classList.remove('hidden');
                return;
            }
            if (!desc) {
                __feedbackSubmitting = false;
                errorEl.textContent = 'Please enter a description.';
                errorEl.classList.remove('hidden');
                return;
            }
            if (desc.length > 2000) {
                __feedbackSubmitting = false;
                errorEl.textContent = 'Description must be under 2000 characters.';
                errorEl.classList.remove('hidden');
                return;
            }

            errorEl.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Submitting...';

            // ── Structured payload for the integration layer ──────────
            const modal = document.getElementById('feedback-modal-overlay');
            const payload = { type, description: desc, contact: email };

            // If an onSubmit callback was provided, delegate to it.
            if (modal && modal._onSubmit) {
                try {
                    await modal._onSubmit(payload);
                    // On success, show the default thank-you view
                    document.getElementById('feedback-form-view').classList.add('hidden');
                    document.getElementById('feedback-success-view').classList.remove('hidden');
                    toast('Feedback submitted — thank you!', 'success');
                } catch (e) {
                    __feedbackSubmitting = false;
                    errorEl.textContent = e.message || 'Failed to submit feedback. Please try again.';
                    errorEl.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Submit Feedback';
                }
                __feedbackSubmitting = false;
                return;
            }

            // ── Default: call the feedback API ────────────────────────
            const apiPayload = { title, description: desc, type };
            if (email) apiPayload.email = email;

            try {
                const headers = { 'Content-Type': 'application/json' };
                const token = localStorage.getItem('fs_token');
                if (token) headers['Authorization'] = `Bearer ${token}`;

                const resp = await fetch(`${API_BASE}/feedback`, {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(apiPayload),
                });

                if (resp.status === 401) {
                    throw new Error('Please sign in to submit feedback.');
                }
                if (!resp.ok) {
                    const data = await resp.json().catch(() => ({}));
                    throw new Error(data.detail || `Request failed (${resp.status})`);
                }

                const result = await resp.json();

                // Show success view with issue link
                document.getElementById('feedback-form-view').classList.add('hidden');
                document.getElementById('feedback-success-view').classList.remove('hidden');

                const link = document.querySelector('.issue-link');
                if (link && result.issue_url) {
                    link.href = result.issue_url;
                    link.textContent = `View Issue #${result.issue_number}`;
                    link.classList.remove('hidden');
                }

                toast('Feedback submitted — thank you!', 'success');
                __feedbackSubmitting = false;
            } catch (e) {
                __feedbackSubmitting = false;
                errorEl.textContent = e.message || 'Failed to submit feedback. Please try again.';
                errorEl.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Feedback';
            }
        }

        // Listen for the custom event to open the feedback modal
        document.addEventListener('open-feedback-form', function () {
            openFeedbackModal();
        });
    </script>
</body>
</html>
