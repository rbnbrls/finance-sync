# Prometheus configuration for finance-sync
# Scrapes the FastAPI /metrics endpoint and the worker health endpoint.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "finance-sync-app"
    static_configs:
      - targets: ["app:8000"]
    metrics_path: "/metrics"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "finance-sync-app"

  - job_name: "finance-sync-worker"
    static_configs:
      - targets: ["worker:9090"]
    metrics_path: "/metrics"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "finance-sync-worker"
