# ==============================================================================
# docker-compose.coolify.yml — finance-sync Coolify Deployment
# ==============================================================================
# This file is used by Coolify to deploy the finance-sync application stack.
# It excludes postgres and redis (managed as standalone Coolify databases)
# and points to them via environment variables + external network.
#
# Environment variables (set in Coolify dashboard):
#   POSTGRES_PASSWORD     — Password for the standalone PostgreSQL database
#   SECRET_KEY            — JWT signing key (min 16 chars)
#   MASTER_ENCRYPTION_KEY — AES-256 key for credential encryption
#   REDIS_PASSWORD        — Password for the standalone Redis database (if set)
# ==============================================================================

services:
  # ── FastAPI Application ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-sync-app
    restart: unless-stopped
    ports:
      - "8000"
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-prod}
      APP_NAME: ${APP_NAME:-finance-sync}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Standalone PostgreSQL (finance-sync-pg) at its Coolify internal hostname
      DATABASE_URL: postgresql+asyncpg://finance_sync:${POSTGRES_PASSWORD:?}@avoxjx7g0c36ru1ez7hetauy:5432/finance_sync
      DATABASE_POOL_MIN_SIZE: ${DATABASE_POOL_MIN_SIZE:-2}
      DATABASE_POOL_MAX_SIZE: ${DATABASE_POOL_MAX_SIZE:-10}
      # Standalone Redis (finance-sync-redis) at its Coolify internal hostname
      REDIS_URL: redis://default:${REDIS_PASSWORD:-}@upof2f9om8d8vppx0nxvvzwg:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-[*]}
    volumes:
      - encryption_keys:/app/keys
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Background Worker ───────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-sync-worker
    restart: unless-stopped
    entrypoint: ["python", "-m", "finance_sync.worker"]
    ports:
      - "9090"
    environment:
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-prod}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://finance_sync:${POSTGRES_PASSWORD:?}@avoxjx7g0c36ru1ez7hetauy:5432/finance_sync
      DATABASE_POOL_MIN_SIZE: 1
      DATABASE_POOL_MAX_SIZE: 2
      REDIS_URL: redis://default:${REDIS_PASSWORD:-}@upof2f9om8d8vppx0nxvvzwg:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-}
      WORKER_HEALTH_PORT: 9090
    volumes:
      - encryption_keys:/app/keys:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9090/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: finance-sync-prometheus
    restart: unless-stopped
    ports:
      - "9091"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      app:
        condition: service_started
      worker:
        condition: service_started

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: finance-sync-grafana
    restart: unless-stopped
    ports:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/sync-health.json
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: https://finance-sync.7rb.nl/grafana/
    volumes:
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  encryption_keys:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
